services:
  postgres:
    image: postgres:16-alpine
    container_name: arenahub-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: arenahub
      POSTGRES_PASSWORD: arenahub_password
      POSTGRES_DB: arenahub
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arenahub -d arenahub"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
